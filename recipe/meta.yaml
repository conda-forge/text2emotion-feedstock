{% set name = "text2emotion" %}
{% set version = "0.0.5" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/text2emotion-{{ version }}.tar.gz
  sha256: a7868ff1aee3362491c9ca094ae3d975678693aaa5e9144d1ad0eb64dd8f32e8

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - emoji >=0.6.0
    - nltk
    - python >={{ python_min }}

test:
  imports:
    - text2emotion
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/aman2656/text2emotion-library
  summary: Detecting emotions behind the text, text2emotion package will help you to understand the emotions in textual meassages.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mxr-conda
    - JennaLipscomb
